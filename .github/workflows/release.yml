name: Release
on:
  workflow_dispatch:
  push:
    branches-ignore:
      - "releases/**"
permissions:
  contents: write
  pull-requests: write
  issues: write
jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      - name: Run build
        run: |
          npm install --silent
          npm run build
      - name: Publish to release branch
        run: |
          # Switch to a dedicated release branch so dist/ never lands on the source branch.
          # -f bypasses .gitignore so the built dist/ files are staged normally.
          git checkout -b releases/${{ github.ref_name }}
          git add -f dist/
          git commit -m "Release ${{ github.ref_name }}"
          git push -f origin releases/${{ github.ref_name }}
      - name: Get version
        id: project-version
        uses: "euberdeveloper/ga-project-version@main"
        with:
          package-manager: npm
      - name: Create release
        run: |
          gh release delete ${{ github.ref_name }} -y || echo 'No release to delete'
          gh release create ${{ github.ref_name }} --target releases/${{ github.ref_name }} -t ${{ github.ref_name }} -n "Release ${{ github.ref_name }}"
        env:
          GH_TOKEN: ${{ github.token }}
